<div class="step-content active">
  <h2 class="step-title">Información del Club</h2>
  <p class="step-subtitle">Cuéntanos sobre tu club deportivo</p>

  <form [formGroup]="clubForm" (ngSubmit)="onSiguiente()" appScrollError>
    <div class="row g-3">
      <!-- Nombre del Club -->
      <div class="col-12">
        <app-campo-texto nombreCampo="Nombre del Club" [controlForm]="clubForm.get('nombre')!"
          placeholder="Ej. Club Atlético Madrid" icono="bi-building" />
      </div>

      <!-- Deporte -->
      <div class="col-md-6">
        <app-campo-dropdown nombreCampo="Deporte" [controlForm]="clubForm.get('deporteId')!"
          [opciones]="opcionesDeportes()" placeholder="Seleccionar deporte..." textoOpciones="nombre" keyOpciones="id"
          icono="bi-trophy" />
      </div>

      <div class="col-md-6">
        <app-campo-dropdown nombreCampo="Departamento" [controlForm]="clubForm.get('departamentoId')!"
          [opciones]="opcionesDepartamentos()" placeholder="Seleccionar departamento..." textoOpciones="nombre"
          keyOpciones="id" icono="bi-map" />
      </div>
      
      <div class="col-md-6">
        <app-campo-dropdown nombreCampo="Ciudad" [controlForm]="clubForm.get('ciudadId')!"
          [opciones]="opcionesCiudades()" placeholder="Seleccionar ciudad..." textoOpciones="nombre"
          keyOpciones="id" icono="bi-geo-alt" />
      </div>

      <!-- Teléfono -->
      <div class="col-md-6">
        <app-campo-texto nombreCampo="Teléfono de Contacto" [controlForm]="clubForm.get('telefono')!"
          placeholder="+57 300 000 000" icono="bi-telephone" />
      </div>

      <!-- Email -->
      <div class="col-md-6">
        <app-campo-texto nombreCampo="Email del Club" [controlForm]="clubForm.get('email')!"
          placeholder="info@miclub.es" icono="bi-envelope" type="email" , icono="bi-envelope" />
      </div>

      <!-- Dirección (opcional) -->
      <div class="col-6">
        <app-campo-texto nombreCampo="Dirección (opcional)" [controlForm]="clubForm.get('direccion')!"
          placeholder="Calle, número, código postal" icono="bi-map" />
      </div>

      <!-- Descripción (opcional) -->
      <div class="col-12">
        <app-campo-area-texto nombreCampo="Descripción del Club (opcional)" [controlForm]="clubForm.get('descripcion')!"
          placeholder="Breve descripción del club, historia, valores..." [filas]="3" />
      </div>
    </div>

    <div class="nav-buttons">
      <button type="submit" class="btn-cp-primary ms-auto">
        Siguiente <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </form>
</div>
