<div class="login-container">
  <app-contexto class="login-left"/>

  <main class="login-right">
    <div class="login-form-wrapper">
      <div class="form-header">
        <h2>Bienvenido de nuevo</h2>
      </div>

      @if (showError) {
        <div class="cp-alert cp-alert-danger" role="alert" aria-live="polite">
          <i class="bi bi-exclamation-circle-fill flex-shrink-0 mt-1" style="font-size:1rem;"></i>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-campo-texto nombreCampo="Correo electrónico" [controlForm]="loginForm.get('email')!"/>
        <div class="mb-3">
          <label for="email" class="cp-label">Correo electrónico</label>
          <div class="input-icon-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input 
              id="email"
              type="email"
              class="cp-input"
              [class.is-invalid]="isFieldInvalid('email')"
              [class.is-valid]="isFieldValid('email')"
              formControlName="email"
              placeholder="admin@miclub.com"
              autocomplete="email"
              inputmode="email"
              aria-required="true"
              aria-describedby="email-error" />
          </div>
          @if (shouldShowError('email')) {
            <div id="email-error" class="field-error show" role="alert">
              {{ getErrorMessage('email') }}
            </div>
          }
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="cp-label">Contraseña</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input 
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              class="cp-input"
              style="padding-right: 3rem;"
              [class.is-invalid]="isFieldInvalid('password')"
              [class.is-valid]="isFieldValid('password')"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              aria-required="true"
              aria-describedby="password-error" />
            <button 
              type="button"
              class="input-suffix-btn"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <i [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword" class="bi"></i>
            </button>
          </div>
          @if (shouldShowError('password')) {
            <div id="password-error" class="field-error show" role="alert">
              {{ getErrorMessage('password') }}
            </div>
          }
        </div>

        <!-- Remember me -->
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="remember" formControlName="remember"
              style="accent-color: var(--primary); cursor:pointer;">
            <label class="form-check-label" for="remember"
              style="font-size:0.85rem; color: var(--text-muted); cursor:pointer;">
              Recordar sesión
            </label>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-cp-primary mb-3" [disabled]="isLoading">
          <span>{{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}</span>
          @if (isLoading) {
            <div class="spinner-sm"></div>
          }
        </button>

        <!-- Forgot password -->
        <div class="text-center">
          <a href="javascript:void(0)" class="forgot-password-link">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </form>

      <!-- Divider -->
      <div class="cp-divider">
        <span>¿Nuevo en Tryvora?</span>
      </div>

      <!-- Register link -->
      <a routerLink="/registro-club" class="register-link">
        <i class="bi bi-building-add"></i>
        Registrar mi club
      </a>
    </div>
  </main>
</div>
