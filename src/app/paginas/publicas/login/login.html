<div class="login-container">
  <app-contexto class="login-left" />

  <main class="login-right">
    <div class="login-form-wrapper">
      <div class="form-header">
        <h2>Bienvenido de nuevo</h2>
      </div>   

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <app-campo-texto nombreCampo="Correo electrónico" [controlForm]="loginForm.get('email')!"
          placeholder="ejemplo@miclub.com" />
        <app-campo-texto nombreCampo="Contraseña" [controlForm]="loginForm.get('password')!" placeholder="••••••••"
          type="password" />
        <app-campo-check textoCampo="Recordar sesión" [controlForm]="loginForm.get('remember')!" />

        <button type="submit" class="btn-cp-primary mb-3" [disabled]="isLoading">
          <span>{{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}</span>
          @if (isLoading) {
          <div class="spinner-sm"></div>
          }
        </button>
        <div class="text-center">
          <a href="javascript:void(0)" class="forgot-password-link">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </form>

      <div class="cp-divider">
        <span>¿Nuevo en Tryvora?</span>
      </div>

      <a routerLink="/registro-club" class="register-link">
        <i class="bi bi-building-add"></i>
        Registrar mi club
      </a>
    </div>
  </main>
</div>
