<div class="dashboard-container">
  <app-sidebar [isOpen]="sidebarOpen()" [isMobile]="isMobile()" [usuarioInfo]="usuarioLogueado()"
    (toggleSidebar)="toggleSidebar()" />

  <div class="sidebar-overlay" [class.show]="uiService.isMobile() && uiService.sidebarOpen()" (click)="toggleSidebar()">
  </div>
  <div [class]="mainWrapperClass()">
    <app-topbar [notificationCount]="3" (toggleSidebar)="toggleSidebar()" (search)="onSearch($event)" />

    <main class="page-content">
      <app-welcome-banner [userName]="usuarioLogueado()?.nombre" [clubName]="usuarioLogueado()?.clubInfo?.nombre ?? ''"
        [totalJugadoresDia]="metricas()?.jugadoresAlDia!" [totalJugadoresMora]="metricas()?.deudores!" [totalComprobantesPendientes]="metricas()?.comprobantesPendientes!" />
      <app-stats-cards [stats]="statCards()" />

      @if (branchStats()) {
      <app-branch-summary [branchStats]="branchStats()!" />
      }

      <div class="row g-4">
        <div class="col-lg-5">
          <app-recent-activity [activities]="recentActivity()" />
        </div>
        <div class="col-lg-7">
          <div class="row g-4">
            <div class="col-12">
              <app-quick-actions (addPlayer)="onAddPlayer()" (registerPayment)="onRegisterPayment()"
                (sendNotification)="onSendNotification()" />
            </div>
            <div class="col-12">
              <app-pending-approvals [approvals]="pendingApprovals()" [pendingCount]="pendingCount()"
                (onApprove)="onApprove($event)" (onReject)="onReject($event)" />
            </div>
          </div>
        </div>
      </div>

      <div class="text-end mt-3">
        <button class="btn btn-sm btn-outline-primary" (click)="refreshDashboard()">
          <i class="bi bi-arrow-repeat"></i> Actualizar
        </button>
      </div>
    </main>
  </div>
</div>
