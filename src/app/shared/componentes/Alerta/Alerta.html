@if (alertService.alert(); as alerta) {
  <div class="alert alert-{{alerta.tipo}} alert-dismissible fade show position-fixed top-0 end-0 m-3" style="z-index:2000; min-width:250px">

    {{ alerta.mensaje }}
    
    <button class="btn-close"
            (click)="alertService.alert.set(null)">
    </button>
  </div>
}
