@if (payment()) {
<div class="modal fade show" style="display:block; background:rgba(0,0,0,0.5);" (click)="close()">
    <div class="modal-dialog modal-dialog-centered modal-sm" (click)="$event.stopPropagation()">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                <div
                    style="width:60px;height:60px;background:#ECFDF5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:#059669;">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <div style="font-size:1rem;font-weight:800;color:var(--text-primary);margin-bottom:0.5rem;">¿Aprobar
                    pago?</div>
                <div style="font-size:0.875rem;color:var(--text-muted);margin-bottom:0.25rem;">{{ payment()?.player }}
                </div>
                <div style="font-size:1.1rem;font-weight:800;color:#059669;margin-bottom:1.5rem;">
                    \${{ payment()?.amount?.toFixed(2) ?? '0.00' }}
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-light flex-fill" (click)="close()"
                        style="border-radius:10px;font-weight:600;">Cancelar</button>
                    <button class="btn btn-success flex-fill" (click)="confirm()"
                        style="border-radius:10px;font-weight:600;">Aprobar</button>
                </div>
            </div>
        </div>
    </div>
</div>
}
