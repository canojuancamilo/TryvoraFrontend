<div class="stats-grid">
  @for (stat of stats(); track stat.id) {
    <div class="stat-card" [class]="stat.type">
      <div class="stat-icon">
        <i [class]="getIconClass(stat.icon)"></i>
      </div>
      <div class="stat-value">{{ stat.value }}</div>
      <div class="stat-label">{{ stat.label }}</div>
      <span class="stat-change" [class]="stat.change.direction">
        <i class="bi" [class.bi-arrow-up]="stat.change.direction === 'up'"
                   [class.bi-arrow-down]="stat.change.direction === 'down'"
                   [class.bi-dash]="stat.change.direction === 'neutral'"></i>
        {{ stat.change.value }}
      </span>
    </div>
  }
</div>
