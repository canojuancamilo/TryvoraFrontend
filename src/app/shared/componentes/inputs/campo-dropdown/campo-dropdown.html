<label class="cp-label">
  {{ nombreCampo() }}
  @if (esRequerido()) {
    <span class="text-danger">*</span>
  }
</label>

<div class="input-icon-wrap">

  <ng-select class="cp-select"
    [items]="opcionesFiltradas()"
    [bindLabel]="textoOpciones()"
    [bindValue]="keyOpciones()"

    [formControl]="formControlGet"

    [searchable]="filterable()"
    [clearable]="true"
    [closeOnSelect]="true"

    [placeholder]="placeholder()"

    [class.is-invalid]="hasError() && formControlGet.touched"

    (search)="handleFilter($event.term)"
    (blur)="onBlur()"
  (clear)="handleClear()" 
  >
  </ng-select>

</div>

<div class="field-error show">
  <app-form-validation
    [control]="formControlGet"
    [label]="nombreCampo()"
  />
</div>
