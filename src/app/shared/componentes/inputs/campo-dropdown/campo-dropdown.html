  <label class="form-label">
    {{ nombreCampo() }}
    @if (esRequerido()) {
      <span class="text-danger">&nbsp;*</span>
    }
  </label>

    <select 
      class="form-select"
      [class.is-invalid]="hasError() && formControlGet.touched"
      [formControl]="formControlGet"
      (blur)="onBlur()"
    >
      <!-- Opción por defecto (placeholder) -->
      @if (espacioReservado()) {
        <option [ngValue]="null" selected disabled>
          {{ espacioReservado() }}
        </option>
      }

      <!-- Opciones del select -->
      @for (opcion of opcionesFiltradas(); track opcion[keyOpciones()]) {
        <option [ngValue]="opcion[keyOpciones()]">
          {{ opcion[textoOpciones()] }}
        </option>
      }
    </select>

    <!-- Validación -->
    <div class="d-flex justify-content-end mt-1">
      <app-form-validation [control]="formControlGet" [label]="nombreCampo()" />
    </div>
