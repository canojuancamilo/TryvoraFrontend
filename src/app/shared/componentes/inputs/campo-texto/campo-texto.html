<label class="cp-label">
    {{ nombreCampo() }}
    @if(esRequerido()){
    <span class="text-danger">*</span>
    }
</label>
<div class="input-icon-wrap">
    <i class="bi bi-envelope input-icon {{icono()}}"></i>
    <input [type]="type()" class="cp-input"
        [ngClass]="{'is-invalid': formControlGet!.invalid && formControlGet!.touched}" [formControl]="formControlGet"
        [placeholder]="placeholder()" />
</div>
<div class="field-error show" role="alert">
    <app-form-validation [control]="formControlGet" [label]="nombreCampo()" />
</div>
