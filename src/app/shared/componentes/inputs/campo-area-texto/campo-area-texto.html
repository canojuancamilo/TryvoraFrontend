<label class="form-label">
    {{ nombreCampo() }}
    @if(esRequerido()){
    <span class="c-error-500">&nbsp;*</span>
    }
</label>
<textarea [formControl]="formControlGet" class="form-control" [rows]="filas()" [placeholder]="placeholder()"
    style="resize:none;"></textarea>

<div class="k-d-flex k-justify-content-end k-mt-1">
    <app-form-validation [control]="formControlGet" [label]="nombreCampo()" />
</div>
