<div class="welcome-banner">
  <div class="welcome-title">¡Bienvenido, {{ userName() }}! 👋</div>
  <div class="welcome-subtitle">{{ clubName() }} — Panel administrativo</div>
  <div class="welcome-date">{{ getFormattedDate() }}</div>
  <div class="welcome-quick-stats">
    <div class="welcome-quick-stat">
      <div class="welcome-quick-stat-dot" style="background:#10B981;"></div>
      <span class="welcome-quick-stat-text">{{totalJugadoresDia()}} jugadores al día</span>
    </div>
    <div class="welcome-quick-stat">
      <div class="welcome-quick-stat-dot" style="background:#EF4444;"></div>
      <span class="welcome-quick-stat-text">{{totalJugadoresMora()}} deudores</span>
    </div>
    <div class="welcome-quick-stat">
      <div class="welcome-quick-stat-dot" style="background:#F59E0B;"></div>
      <span class="welcome-quick-stat-text">{{totalComprobantesPendientes()}} comprobantes pendientes</span>
    </div>
  </div>
</div>
